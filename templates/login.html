        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid rgba(255,85,0,0.4);
            box-shadow: 0 0 40px rgba(255,85,0,0.25), 0 0 80px rgba(255,85,0,0.1);
            margin-bottom: 14px;
        }
        .login-logo p {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .login-card {
            background: rgba(22,22,22,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,85,0,0.15);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
        }
        .login-card h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            background: rgba(37,37,37,0.9);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 14px;
            font-family: 'Barlow', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: var(--laranja); box-shadow: 0 0 0 3px rgba(255,85,0,0.1); }
        input::placeholder { color: #3a3a3a; }
        .btn {
            background: linear-gradient(135deg, var(--laranja), var(--laranja-dark));
            color: #fff;
            border: none;
            padding: 13px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            width: 100%;
            letter-spacing: 1.5px;
            transition: all 0.2s;
            text-transform: uppercase;
            margin-top: 6px;
            box-shadow: 0 4px 20px rgba(255,85,0,0.3);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,85,0,0.45); }
        .btn:active { transform: translateY(0); }
        .erro { background: rgba(255,61,61,0.1); border: 1px solid rgba(255,61,61,0.3); color: #ff8888; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    </style>

        {% endif %}

        </form>
