{% extends "base.html" %}
{% block title %}Agenda{% endblock %}

{% block extra_styles %}
<style>
/* ── TOOLBAR ── */
.agenda-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}
.view-toggle {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}
.view-toggle button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 18px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    transition: .2s;
}
.view-toggle button.active {
    background: var(--laranja);
    color: #fff;
    font-weight: 600;
}

/* ── MÊS ── */
.cal-grid {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}
.cal-head {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--bg4);
    border-bottom: 1px solid var(--border);
}
.cal-head div {
    padding: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
}
.cal-body {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
}
.cal-day {
    min-height: 100px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    cursor: pointer;
    transition: .15s;
}
.cal-day:hover { background: rgba(255,85,0,.06); }
.cal-day.outro-mes .num { color: #444; }
.cal-day.hoje { background: rgba(255,85,0,.08); }
.cal-day.hoje .num {
    background: var(--laranja);
    color: #fff;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.cal-day .num {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ev-pill {
    background: rgba(255,85,0,.18);
    border-left: 3px solid var(--laranja);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
}
.ev-pill:hover { background: rgba(255,85,0,.35); }

/* ── SEMANA ── */
.semana-grid {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
}
.semana-head {
    display: grid;
    grid-template-columns: 70px repeat(7, 1fr);
    background: var(--bg4);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
}
.semana-head div {
    padding: 10px 6px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    border-right: 1px solid var(--border);
}
.semana-head .col-hoje {
    background: rgba(255,85,0,.12);
    color: var(--laranja);
}
.semana-row {
    display: grid;
    grid-template-columns: 70px repeat(7, 1fr);
}
.hora-label {
    background: var(--bg4);
    padding: 8px 6px;
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
}
.slot {
    min-height: 70px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 3px;
    cursor: pointer;
    transition: .15s;
}
.slot:hover { background: rgba(255,85,0,.07); }
.slot.col-hoje { background: rgba(255,85,0,.04); }
.ev-block {
    background: rgba(255,85,0,.18);
    border-left: 3px solid var(--laranja);
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
}
.ev-block strong { display: block; color: var(--laranja); font-size: 12px; }
.ev-block:hover { background: rgba(255,85,0,.32); }

/* ── MODAL ── */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
.modal-overlay.aberto { display: flex; }
.modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
}
.modal h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; margin-bottom: 20px; }
.modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: none; border: none;
    color: var(--muted); font-size: 18px;
    cursor: pointer;
}
.modal-close:hover { color: var(--text); }

/* ev detalhe */
.ev-detalhe-info { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.ev-detalhe-info span { font-size: 14px; color: var(--muted); }
.ev-detalhe-info strong { color: var(--text); }
.badge-cache {
    display: inline-block;
    background: rgba(255,85,0,.15);
    border: 1px solid rgba(255,85,0,.3);
    color: var(--laranja);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 15px;
}
</style>
{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-title"><span>📅</span> Agenda de Eventos</div>
    <div class="agenda-toolbar">
        <div class="view-toggle">
            <button id="btn-mes" class="active" onclick="setView('mes')">📆 Mês</button>
            <button id="btn-semana" onclick="setView('semana')">📋 Semana</button>
        </div>
        <button class="btn btn-secondary" onclick="navegar(-1)">◀ Anterior</button>
        <strong id="label-periodo" style="min-width:160px;text-align:center"></strong>
        <button class="btn btn-secondary" onclick="navegar(1)">Próximo ▶</button>
        <button class="btn" onclick="abrirNovo()">＋ Novo Evento</button>
    </div>
</div>

<!-- VISUALIZAÇÃO MÊS -->
<div id="view-mes">
    <div class="cal-grid">
        <div class="cal-head">
            <div>Dom</div><div>Seg</div><div>Ter</div>
            <div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>
        <div class="cal-body" id="cal-body"></div>
    </div>
</div>

<!-- VISUALIZAÇÃO SEMANA -->
<div id="view-semana" style="display:none">
    <div class="semana-grid">
        <div class="semana-head" id="semana-head"></div>
        <div id="semana-body"></div>
    </div>
</div>

<!-- MODAL NOVO/EDITAR EVENTO -->
<div class="modal-overlay" id="modal-form">
    <div class="modal">
        <button class="modal-close" onclick="fecharModais()">✕</button>
        <h2 id="modal-form-titulo">📅 Novo Evento</h2>
        <input type="hidden" id="ev-id">
        <div class="form-group">
            <label>Nome da Banda / Evento</label>
            <input type="text" id="ev-nome" placeholder="EX: GRUPO PANTANEIRO">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="ev-data">
            </div>
            <div class="form-group">
                <label>Horário</label>
                <input type="time" id="ev-hora">
            </div>
        </div>
        <div class="form-group">
            <label>Cachê (R$)</label>
            <input type="number" id="ev-cache" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
            <label>Observações</label>
            <textarea id="ev-obs" rows="3" placeholder="Informações adicionais"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:6px">
            <button class="btn" style="flex:1;justify-content:center" onclick="salvarEvento()">💾 Salvar</button>
            <button class="btn btn-secondary" id="btn-excluir" style="display:none" onclick="excluirEvento()">🗑 Excluir</button>
        </div>
    </div>
</div>

<!-- MODAL DETALHE EVENTO -->
<div class="modal-overlay" id="modal-detalhe">
    <div class="modal" style="max-width:420px">
        <button class="modal-close" onclick="fecharModais()">✕</button>
        <h2 id="det-nome" style="color:var(--laranja)"></h2>
        <div class="ev-detalhe-info">
            <div><span>📅 Data</span><br><strong id="det-data"></strong></div>
            <div><span>🕐 Horário</span><br><strong id="det-hora"></strong></div>
            <div><span>💰 Cachê</span><br><span class="badge-cache" id="det-cache"></span></div>
            <div id="det-obs-wrap" style="display:none"><span>📝 Obs</span><br><strong id="det-obs"></strong></div>
        </div>
        <div style="display:flex;gap:10px">
            <button class="btn" style="flex:1;justify-content:center" onclick="editarDetalhe()">✏️ Editar</button>
            <button class="btn btn-secondary" style="flex:1;justify-content:center" onclick="fecharModais()">Fechar</button>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_SEMANA = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const HORAS = ['18:00','19:00','20:00','21:00','22:00','23:00','00:00','01:00','02:00','03:00'];

let view = 'mes';
let hoje = new Date();
let cursor = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
let semanaBase = inicioSemana(hoje);
let eventos = [];
let eventoDetalhe = null;

// ── Utils ──
function pad(n){ return String(n).padStart(2,'0'); }
function fmtData(d){ return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`; }
function isoDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function inicioSemana(d){
    const s = new Date(d);
    s.setDate(s.getDate() - s.getDay());
    return s;
}

// ── API ──
async function carregarEventos(){
    try {
        const r = await fetch('/api/agenda');
        eventos = await r.json();
    } catch(e){ eventos = []; }
    renderizar();
}

async function salvarEvento(){
    const nome  = document.getElementById('ev-nome').value.trim();
    const data  = document.getElementById('ev-data').value;
    const hora  = document.getElementById('ev-hora').value;
    const cache = parseFloat(document.getElementById('ev-cache').value) || 0;
    const obs   = document.getElementById('ev-obs').value.trim();
    const id    = document.getElementById('ev-id').value;

    if(!nome || !data || !hora){ alert('Preencha nome, data e horário.'); return; }

    const payload = { nome, data, hora, cache, obs };
    const url    = id ? `/api/agenda/${id}` : '/api/agenda';
    const method = id ? 'PUT' : 'POST';

    const r = await fetch(url, {
        method,
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
    });
    if(r.ok){
        fecharModais();
        carregarEventos();
    } else {
        alert('Erro ao salvar evento.');
    }
}

async function excluirEvento(){
    const id = document.getElementById('ev-id').value;
    if(!id || !confirm('Excluir este evento?')) return;
    const r = await fetch(`/api/agenda/${id}`, { method: 'DELETE' });
    if(r.ok){ fecharModais(); carregarEventos(); }
}

// ── Navegação ──
function setView(v){
    view = v;
    document.getElementById('btn-mes').classList.toggle('active', v==='mes');
    document.getElementById('btn-semana').classList.toggle('active', v==='semana');
    document.getElementById('view-mes').style.display    = v==='mes'    ? '' : 'none';
    document.getElementById('view-semana').style.display = v==='semana' ? '' : 'none';
    renderizar();
}

function navegar(dir){
    if(view === 'mes'){
        cursor.setMonth(cursor.getMonth() + dir);
    } else {
        semanaBase.setDate(semanaBase.getDate() + dir * 7);
    }
    renderizar();
}

// ── Render ──
function renderizar(){
    if(view === 'mes') renderMes();
    else renderSemana();
}

function eventosData(dataISO){
    return eventos.filter(e => e.data === dataISO);
}

function renderMes(){
    const ano = cursor.getFullYear();
    const mes = cursor.getMonth();
    document.getElementById('label-periodo').textContent = `${MESES[mes]} ${ano}`;

    const body = document.getElementById('cal-body');
    body.innerHTML = '';

    const primeiro = new Date(ano, mes, 1);
    const ultimo   = new Date(ano, mes+1, 0);
    let dia = new Date(primeiro);
    dia.setDate(dia.getDate() - dia.getDay());

    const hojeISO = isoDate(hoje);

    while(dia <= ultimo || dia.getDay() !== 0){
        const iso    = isoDate(dia);
        const outroMes = dia.getMonth() !== mes;
        const ehHoje   = iso === hojeISO;
        const evs      = eventosData(iso);

        const cell = document.createElement('div');
        cell.className = 'cal-day' + (outroMes?' outro-mes':'') + (ehHoje?' hoje':'');

        const num = document.createElement('div');
        num.className = 'num';
        num.textContent = dia.getDate();
        cell.appendChild(num);

        evs.forEach(ev => {
            const pill = document.createElement('div');
            pill.className = 'ev-pill';
            pill.textContent = `${ev.hora} ${ev.nome}`;
            pill.onclick = (e) => { e.stopPropagation(); abrirDetalhe(ev); };
            cell.appendChild(pill);
        });

        const dataCaptura = iso;
        cell.onclick = () => abrirNovo(dataCaptura);
        body.appendChild(cell);

        dia.setDate(dia.getDate()+1);
        if(dia > ultimo && dia.getDay() === 0) break;
    }
}

function renderSemana(){
    const head = document.getElementById('semana-head');
    const body = document.getElementById('semana-body');
    head.innerHTML = '';
    body.innerHTML = '';

    const hojeISO = isoDate(hoje);
    const dias = [];
    for(let i=0;i<7;i++){
        const d = new Date(semanaBase);
        d.setDate(d.getDate()+i);
        dias.push(d);
    }

    // Label período
    const ini = dias[0], fim = dias[6];
    document.getElementById('label-periodo').textContent =
        `${pad(ini.getDate())}/${pad(ini.getMonth()+1)} – ${pad(fim.getDate())}/${pad(fim.getMonth()+1)}/${fim.getFullYear()}`;

    // Cabeçalho
    const th0 = document.createElement('div');
    th0.textContent = 'Hora';
    head.appendChild(th0);
    dias.forEach(d => {
        const th = document.createElement('div');
        const iso = isoDate(d);
        th.className = iso === hojeISO ? 'col-hoje' : '';
        th.innerHTML = `${DIAS_SEMANA[d.getDay()]}<br><strong>${pad(d.getDate())}/${pad(d.getMonth()+1)}</strong>`;
        head.appendChild(th);
    });

    // Linhas de hora
    HORAS.forEach(h => {
        const row = document.createElement('div');
        row.className = 'semana-row';

        const hl = document.createElement('div');
        hl.className = 'hora-label';
        hl.textContent = h;
        row.appendChild(hl);

        dias.forEach(d => {
            const iso = isoDate(d);
            const slot = document.createElement('div');
            slot.className = 'slot' + (iso === hojeISO ? ' col-hoje' : '');

            const evs = eventosData(iso).filter(ev => ev.hora && ev.hora.startsWith(h.substring(0,2)));
            evs.forEach(ev => {
                const bl = document.createElement('div');
                bl.className = 'ev-block';
                bl.innerHTML = `<strong>${ev.nome}</strong>${ev.hora}`;
                bl.onclick = (e) => { e.stopPropagation(); abrirDetalhe(ev); };
                slot.appendChild(bl);
            });

            slot.onclick = () => abrirNovo(iso, h);
            row.appendChild(slot);
        });

        body.appendChild(row);
    });
}

// ── Modais ──
function fecharModais(){
    document.getElementById('modal-form').classList.remove('aberto');
    document.getElementById('modal-detalhe').classList.remove('aberto');
    eventoDetalhe = null;
}

function abrirNovo(dataISO, hora){
    document.getElementById('modal-form-titulo').textContent = '📅 Novo Evento';
    document.getElementById('ev-id').value    = '';
    document.getElementById('ev-nome').value  = '';
    document.getElementById('ev-obs').value   = '';
    document.getElementById('ev-cache').value = '';
    document.getElementById('ev-data').value  = dataISO || isoDate(hoje);
    document.getElementById('ev-hora').value  = hora || '20:00';
    document.getElementById('btn-excluir').style.display = 'none';
    document.getElementById('modal-form').classList.add('aberto');
}

function abrirDetalhe(ev){
    eventoDetalhe = ev;
    document.getElementById('det-nome').textContent  = ev.nome;
    document.getElementById('det-data').textContent  = fmtData(new Date(ev.data+'T00:00:00'));
    document.getElementById('det-hora').textContent  = ev.hora;
    document.getElementById('det-cache').textContent = `R$ ${parseFloat(ev.cache||0).toFixed(2)}`;
    const obsWrap = document.getElementById('det-obs-wrap');
    if(ev.obs){ obsWrap.style.display=''; document.getElementById('det-obs').textContent = ev.obs; }
    else { obsWrap.style.display='none'; }
    document.getElementById('modal-detalhe').classList.add('aberto');
}

function editarDetalhe(){
    if(!eventoDetalhe) return;
    fecharModais();
    const ev = eventoDetalhe;
    document.getElementById('modal-form-titulo').textContent = '✏️ Editar Evento';
    document.getElementById('ev-id').value    = ev.id;
    document.getElementById('ev-nome').value  = ev.nome;
    document.getElementById('ev-data').value  = ev.data;
    document.getElementById('ev-hora').value  = ev.hora;
    document.getElementById('ev-cache').value = ev.cache || 0;
    document.getElementById('ev-obs').value   = ev.obs || '';
    document.getElementById('btn-excluir').style.display = '';
    document.getElementById('modal-form').classList.add('aberto');
}

// fechar clicando fora
document.getElementById('modal-form').addEventListener('click', function(e){
    if(e.target === this) fecharModais();
});
document.getElementById('modal-detalhe').addEventListener('click', function(e){
    if(e.target === this) fecharModais();
});

// ── Init ──
carregarEventos();
</script>
{% endblock %}
